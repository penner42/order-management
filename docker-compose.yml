services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ports:
    #   - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/order_management
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BROWSER_EXTENSION_DIR: /browser-extension
      WEB_EXT_API_KEY: ${WEB_EXT_API_KEY:-}
      WEB_EXT_API_SECRET: ${WEB_EXT_API_SECRET:-}
    volumes:
      - ./browser-extension:/browser-extension
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - __pycache__
            - "*.pyc"
            - .git
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile

  package-tracking:
    build:
      context: ./package-tracking
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      UPS_CLIENT: ${UPS_CLIENT:-}
      UPS_SECRET: ${UPS_SECRET:-}
    develop:
      watch:
        - action: sync+restart
          path: ./package-tracking
          target: /app
          ignore:
            - __pycache__
            - "*.pyc"
            - .git
        - action: rebuild
          path: ./package-tracking/requirements.txt
        - action: rebuild
          path: ./package-tracking/Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8000
      VITE_PACKAGE_TRACKING_API_BASE: /tracking
      PACKAGE_TRACKING_PROXY_TARGET: http://package-tracking:8080
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules
            - dist
            - .git
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  pgdata:
