<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Manager Integration Settings</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --accent: #6ae4ff;
        --danger: #ff6a7a;
        --ok: #46f0a2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 600px at 10% 0%, #111a3d, var(--bg));
        color: var(--text);
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(8px);
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input[type="url"],
      input[type="text"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.25);
        color: var(--text);
        outline: none;
        font-size: 14px;
      }

      input:focus {
        border-color: rgba(106, 228, 255, 0.7);
        box-shadow: 0 0 0 3px rgba(106, 228, 255, 0.15);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
        align-items: center;
      }

      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        padding: 10px 12px;
        background: rgba(106, 228, 255, 0.12);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: rgba(106, 228, 255, 0.18);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.08);
      }

      button.secondary:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .status {
        flex: 1;
        min-width: 240px;
        font-size: 13px;
        color: var(--muted);
      }

      .status.ok {
        color: var(--ok);
      }

      .status.error {
        color: var(--danger);
      }

      .examples {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      code {
        padding: 1px 6px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.25);
        color: rgba(255, 255, 255, 0.88);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Order Manager Integration Settings</h1>
          <p class="hint">
            Configure the Order Manager API base URL used when sending store orders.
          </p>
        </div>
      </header>

      <div class="panel">
        <label for="baseUrl">Order Manager API base URL</label>
        <input
          id="baseUrl"
          type="text"
          inputmode="url"
          autocomplete="off"
          spellcheck="false"
          placeholder="https://orders.example.com"
        />

        <div class="row">
          <button id="save">Save</button>
          <button id="clear" class="secondary">Clear</button>
          <div id="status" class="status" role="status" aria-live="polite"></div>
        </div>

        <div class="examples">
          Examples:
          <code>http://localhost:8000</code>
          <code>https://orders.mycompany.com</code>
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
