<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      min-width: 280px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #0071dc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
    }
    button:hover {
      background: #005ba8;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    input {
      width: 60px;
      padding: 6px 8px;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: inherit;
    }
    #results {
      font-size: 13px;
      line-height: 1.4;
      max-height: 320px;
      overflow-y: auto;
    }
    #results .order-number {
      font-weight: 600;
      margin-bottom: 4px;
    }
    #results .order-date,
    #results .account {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    #results .address {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      white-space: pre-line;
    }
    #results .payment {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }
    #results .item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    #results .item:last-child {
      border-bottom: none;
    }
    #results .item-name {
      font-weight: 500;
    }
    #results .item-meta {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }
    #results .order-total {
      font-weight: 600;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    #results .error {
      color: #c00;
    }
    #results .loading {
      color: #555;
      font-style: italic;
    }
    #usabgResults {
      font-size: 12px;
      line-height: 1.4;
      max-height: 240px;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      margin-top: 8px;
      white-space: pre;
    }
    #usabgSection,
    #bgSection {
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    #usabgSectionTitle,
    #bgSectionTitle {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    #bgResults {
      font-size: 12px;
      line-height: 1.4;
      max-height: 240px;
      overflow-y: auto;
      background: #f5f5f5;
      padding: 8px;
      border-radius: 4px;
      margin-top: 8px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <button id="getOrderDetails">
    Get Order Details
  </button>
  <button id="sendToApp" style="margin-top: 8px; display: none;">
    Send to Order Manager
  </button>
  <div id="results" style="margin-top: 12px; display: none;"></div>
  <div id="usabgSection" style="display: none;">
    <div id="usabgSectionTitle">USABG Buyer POs (app.usabuying.group only)</div>
    <button id="usabgLoadPos" style="margin-top: 4px;">
      Load Buyer POs
    </button>
    <pre id="usabgResults" style="display: none;"></pre>
  </div>
  <div id="bgSection" style="display: none;">
    <div id="bgSectionTitle">BG Orders (buyinggroup.com only)</div>
    <button id="bgLoadOrders" style="margin-top: 4px;">
      Load Orders
    </button>
    <pre id="bgResults" style="display: none;"></pre>
  </div>
  <script src="popup.js"></script>
</body>
</html>
