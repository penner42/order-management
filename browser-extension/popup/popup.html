<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      min-width: 280px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #0071dc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
    }
    button:hover {
      background: #005ba8;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    input {
      width: 60px;
      padding: 6px 8px;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: inherit;
    }
    #results {
      font-size: 13px;
      line-height: 1.4;
      max-height: 320px;
      overflow-y: auto;
    }
    #results .order-number {
      font-weight: 600;
      margin-bottom: 4px;
    }
    #results .order-date,
    #results .account {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    #results .address {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
      white-space: pre-line;
    }
    #results .payment {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }
    #results .item {
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    #results .item:last-child {
      border-bottom: none;
    }
    #results .item-name {
      font-weight: 500;
    }
    #results .item-meta {
      font-size: 12px;
      color: #555;
      margin-top: 2px;
    }
    #results .order-total {
      font-weight: 600;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    #results .error {
      color: #c00;
    }
    #results .loading {
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <label for="pageCount">Number of pages</label>
  <input type="number" id="pageCount" min="1" value="1" />
  <button id="getOrders">Get Order Numbers</button>
  <button id="getOrderDetails" style="margin-top: 8px">
    Get Order Details
  </button>
  <button id="sendToApp" style="margin-top: 8px; display: none;">
    Send to Order Manager
  </button>
  <div id="results" style="margin-top: 12px; display: none;"></div>
  <script src="popup.js"></script>
</body>
</html>
