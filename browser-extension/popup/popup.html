<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      min-width: 180px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #0071dc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
    }
    button:hover {
      background: #005ba8;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #555;
    }
    input {
      width: 60px;
      padding: 6px 8px;
      margin-bottom: 12px;
      font-size: 14px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <label for="pageCount">Number of pages</label>
  <input type="number" id="pageCount" min="1" value="1" />
  <button id="getOrders">Get Order Numbers</button>
  <script src="popup.js"></script>
</body>
</html>
